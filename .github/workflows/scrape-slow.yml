name: Scrape — Slow (eBay Sold Comps + 1stDibs)

# eBay scrapes 5 antique categories × deeper pagination of sold listings — the most
# thorough source of real market-clearing prices for the AI valuation engine.
# 1stDibs provides premium dealer asking prices across 6 search queries.
# Both are rate-limited to be respectful; typically 15-20 minutes total.
# Runs once daily at 2 AM UTC (off-peak for both platforms).
#
# Output: apps/web/src/data/scraped-listings-ebay.json
# Vercel redeploys automatically on push via GitHub integration.
on:
  schedule:
    - cron: "0 2 * * *"   # 2:00 AM UTC daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 70     # eBay + 1stDibs can spike higher with deeper pagination

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli asyncpg "sqlalchemy[asyncio]"

      - name: Scrape high-value pricing sources with per-source fail-safes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          rm -f apps/web/src/data/_tmp-ebay-*.json

          python backend/scrapers/hydrate.py --targets eb --state "" --max-pages 60 --out apps/web/src/data/_tmp-ebay-eb.json || echo "WARN: eBay scrape failed"
          python backend/scrapers/hydrate.py --targets 1d --state "" --max-pages 25 --out apps/web/src/data/_tmp-ebay-1d.json || echo "WARN: 1stDibs scrape failed"

          python - <<'PY'
          import glob, json
          from pathlib import Path
          files=sorted(glob.glob('apps/web/src/data/_tmp-ebay-*.json'))
          rows=[]
          seen=set()
          for f in files:
              try:
                  d=json.load(open(f))
                  arr=d if isinstance(d,list) else d.get('listings', d.get('results', []))
              except Exception:
                  continue
              for r in arr:
                  if not isinstance(r,dict):
                      continue
                  platform=((r.get('platform') or {}).get('name')) or 'unknown'
                  ext=r.get('external_id') or r.get('id')
                  key=(platform, str(ext))
                  if key in seen:
                      continue
                  seen.add(key)
                  rows.append(r)
          if not rows:
              raise SystemExit('ERROR: no listings scraped from any pricing source')
          out=Path('apps/web/src/data/scraped-listings-ebay.json')
          out.write_text(json.dumps(rows, ensure_ascii=False))
          print(f'Wrote {len(rows)} merged pricing listings from {len(files)} source files')
          PY

      - name: Validate listing count and show platform mix
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          p='apps/web/src/data/scraped-listings-ebay.json'
          d=json.load(open(p))
          rows=d if isinstance(d,list) else d.get('listings', d.get('results', []))
          count=len(rows)
          c=Counter((r.get('platform') or {}).get('name','unknown') for r in rows if isinstance(r,dict))
          print(f'Scraped {count} listings')
          print('Platform mix:', dict(c.most_common()))
          hard_min=8
          target_min=20
          if count < hard_min:
              raise SystemExit(f'ERROR: Only {count} listings scraped (hard minimum: {hard_min}).')
          if count < target_min:
              print(f'WARNING: Below target minimum ({target_min}); continuing to avoid false-fail.')
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings-ebay.json
          git diff --staged --quiet || git commit -m "chore: refresh eBay sold comps + 1stDibs [skip ci]"
          git push origin ${{ github.ref_name }}
