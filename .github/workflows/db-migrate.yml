name: Database Migrations

# Run Alembic migrations against Supabase.
# Trigger manually from the Actions tab whenever you deploy schema changes.
# Safe to re-run — Alembic tracks which migrations have already been applied.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -e ./backend

      - name: Validate migration environment
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from sqlalchemy.engine.url import make_url

          db_url = os.environ.get("DATABASE_URL", "")
          if not db_url:
              raise SystemExit("DATABASE_URL secret is not set")

          url = make_url(db_url)
          print(f"DB host: {url.host}")
          print(f"DB driver in secret: {url.drivername}")
          PY

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .
        run: python -m alembic upgrade head
