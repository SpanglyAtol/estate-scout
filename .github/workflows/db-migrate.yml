name: Database Migrations

# Run Alembic migrations against Supabase.
# Trigger manually from the Actions tab whenever you deploy schema changes.
# Safe to re-run — Alembic tracks which migrations have already been applied.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -e ./backend

      - name: Verify no merge markers in migration-related files
        run: |
          rg -n "^(<<<<<<<|=======|>>>>>>>)" backend/alembic .github/workflows/db-migrate.yml || true
          if rg -n "^(<<<<<<<|=======|>>>>>>>)" backend/alembic .github/workflows/db-migrate.yml; then
            echo "Merge conflict markers found in migration-related files"
            exit 1
          fi

      - name: Compile-check Alembic files
        run: |
          python -m py_compile backend/alembic/env.py
          python -m py_compile backend/alembic/versions/*.py

      - name: Validate migration environment
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os
          from sqlalchemy.engine.url import make_url

          db_url = os.environ.get("DATABASE_URL", "")
          if not db_url:
              raise SystemExit("DATABASE_URL secret is not set")

          url = make_url(db_url)
          print(f"DB host: {url.host}")
          print(f"DB driver in secret: {url.drivername}")
          PY

      - name: Verify migration env.py is the expected resolved version
        run: |
          echo "Workflow commit SHA: $GITHUB_SHA"
          git rev-parse HEAD
          echo "Checking for stale Alembic URL mutation code..."
          if rg -n 'config\.set_main_option\("sqlalchemy\.url"' backend/alembic/env.py; then
            echo "Found deprecated config.set_main_option path in backend/alembic/env.py"
            exit 1
          fi
          echo "env.py import section:"
          sed -n '1,45p' backend/alembic/env.py

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: .
        run: python -m alembic upgrade head
