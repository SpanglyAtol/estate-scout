name: Scrape — Fast (BidSpotter + HiBid)

# BidSpotter and HiBid use direct APIs (JSON/GraphQL) — no rate-limit issues,
# typically completes in 3-5 minutes.  Runs every 2 hours for near-live data.
#
# Output: apps/web/src/data/scraped-listings-fast.json
# Vercel redeploys automatically on push via GitHub integration.
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli

      - name: Scrape BidSpotter + HiBid (all US, 17 pages each)
        run: |
          python backend/scrapers/hydrate.py \
            --targets bs,hi \
            --state "" \
            --max-pages 17 \
            --out apps/web/src/data/scraped-listings-fast.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings-fast.json
          git diff --staged --quiet || git commit -m "chore: refresh fast listings (bs+hi) [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
