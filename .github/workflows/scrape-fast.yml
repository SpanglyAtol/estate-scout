name: Scrape — Fast (BidSpotter + HiBid + EBTH)

# BidSpotter and HiBid use direct APIs (JSON/GraphQL) — no rate-limit issues.
# EBTH added for individual estate-sale item volume.
# Invaluable removed: Cloudflare hard-blocks GitHub Actions IPs on all categories.
# Runs every 2 hours for near-live data.
# At 90 pages each, targets ~10,800 listings per run (3 scrapers × 90p × ~40 listings/page).
#
# Output: apps/web/src/data/scraped-listings-fast.json
# Vercel redeploys automatically on push via GitHub integration.
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli asyncpg "sqlalchemy[asyncio]"

      - name: Scrape high-volume sources with per-source fail-safes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          rm -f apps/web/src/data/_tmp-fast-*.json

          python backend/scrapers/hydrate.py --targets bs --state "" --max-pages 120 --out apps/web/src/data/_tmp-fast-bs.json || echo "WARN: BidSpotter scrape failed"
          python backend/scrapers/hydrate.py --targets hi --state "" --max-pages 120 --out apps/web/src/data/_tmp-fast-hi.json || echo "WARN: HiBid scrape failed"
          python backend/scrapers/hydrate.py --targets et --state "" --max-pages 80  --out apps/web/src/data/_tmp-fast-et.json || echo "WARN: EBTH scrape failed"

          python - <<'PY'
          import glob, json
          from pathlib import Path
          files=sorted(glob.glob('apps/web/src/data/_tmp-fast-*.json'))
          rows=[]
          seen=set()
          for f in files:
              try:
                  d=json.load(open(f))
                  arr=d if isinstance(d,list) else d.get('listings', d.get('results', []))
              except Exception:
                  continue
              for r in arr:
                  if not isinstance(r,dict):
                      continue
                  platform=((r.get('platform') or {}).get('name')) or 'unknown'
                  ext=r.get('external_id') or r.get('id')
                  key=(platform, str(ext))
                  if key in seen:
                      continue
                  seen.add(key)
                  rows.append(r)
          if not rows:
              raise SystemExit('ERROR: no listings scraped from any fast source')
          out=Path('apps/web/src/data/scraped-listings-fast.json')
          out.write_text(json.dumps(rows, ensure_ascii=False))
          print(f'Wrote {len(rows)} merged fast listings from {len(files)} source files')
          PY

      - name: Validate listing count and show platform mix
        run: |
          python - <<'PY'
          import json
          from collections import Counter
          p='apps/web/src/data/scraped-listings-fast.json'
          d=json.load(open(p))
          rows=d if isinstance(d,list) else d.get('listings', d.get('results', []))
          count=len(rows)
          c=Counter((r.get('platform') or {}).get('name','unknown') for r in rows if isinstance(r,dict))
          print(f'Scraped {count} listings')
          print('Platform mix:', dict(c.most_common()))
          hard_min=25
          target_min=100
          if count < hard_min:
              raise SystemExit(f'ERROR: Only {count} listings scraped (hard minimum: {hard_min}).')
          if count < target_min:
              print(f'WARNING: Below target minimum ({target_min}); continuing to avoid false-fail.')
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings-fast.json
          git diff --staged --quiet || git commit -m "chore: refresh fast listings (bs+hi+et) [skip ci]"
          git push origin ${{ github.ref_name }}
