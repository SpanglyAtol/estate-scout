name: Scrape — National (LA + Discovery + Estate Sources)

# LiveAuctioneers: highest-volume auction aggregator — 3-layer anti-403 strategy.
# Discovery: finds and scrapes small regional auction sites not on major platforms.
# Adds estate-heavy sources (EstateSales, MaxSold, Proxibid, AuctionZip) to ensure
# both individual-item and estate-sale sections stay populated. Runs daily at 3 AM UTC.
#
# Output: apps/web/src/data/scraped-listings.json  (the legacy fallback slot)
# Vercel redeploys automatically on push via GitHub integration.
on:
  schedule:
    - cron: "0 3 * * *"   # 3:00 AM UTC daily (1 hour after slow workflow)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli asyncpg "sqlalchemy[asyncio]"

      - name: Scrape national individual-item + estate-sale sources
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python backend/scrapers/hydrate.py \
            --targets la,dc,es,ms,pb,az \
            --state "" \
            --max-pages 60 \
            --out apps/web/src/data/scraped-listings.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings.json
          git diff --staged --quiet || git commit -m "chore: refresh national listings (la+dc+es+ms+pb+az) [skip ci]"
          git push origin ${{ github.ref_name }}
