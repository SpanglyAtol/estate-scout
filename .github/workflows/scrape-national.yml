name: Scrape — National (LA + Discovery + Estate Sources)

# LiveAuctioneers: highest-volume auction aggregator — 3-layer anti-403 strategy.
# Discovery: finds and scrapes small regional auction sites not on major platforms.
# Adds estate-heavy sources (EstateSales, MaxSold, Proxibid, AuctionZip) to ensure
# both individual-item and estate-sale sections stay populated. Runs daily at 3 AM UTC.
#
# Output: apps/web/src/data/scraped-listings.json  (the legacy fallback slot)
# Vercel redeploys automatically on push via GitHub integration.
on:
  schedule:
    - cron: "0 3 * * *"   # 3:00 AM UTC daily (1 hour after slow workflow)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest branch updates
        run: git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli asyncpg "sqlalchemy[asyncio]"

      - name: Scrape national sources with per-source fail-safes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set +e
          rm -f apps/web/src/data/_tmp-national-*.json

          python backend/scrapers/hydrate.py --targets la --state "" --max-pages 100 --out apps/web/src/data/_tmp-national-la.json || echo "WARN: LiveAuctioneers scrape failed"
          python backend/scrapers/hydrate.py --targets dc --state "" --max-pages 60  --out apps/web/src/data/_tmp-national-dc.json || echo "WARN: Discovery scrape failed"
          python backend/scrapers/hydrate.py --targets es --state "" --max-pages 50  --out apps/web/src/data/_tmp-national-es.json || echo "WARN: EstateSales scrape failed"
          python backend/scrapers/hydrate.py --targets ms --state "" --max-pages 50  --out apps/web/src/data/_tmp-national-ms.json || echo "WARN: MaxSold scrape failed"
          python backend/scrapers/hydrate.py --targets pb --state "" --max-pages 45  --out apps/web/src/data/_tmp-national-pb.json || echo "WARN: Proxibid scrape failed"
          python backend/scrapers/hydrate.py --targets az --state "" --max-pages 45  --out apps/web/src/data/_tmp-national-az.json || echo "WARN: AuctionZip scrape failed"

          python - <<'PY'
          import glob, json
          from pathlib import Path
          files=sorted(glob.glob('apps/web/src/data/_tmp-national-*.json'))
          rows=[]
          seen=set()
          for f in files:
              try:
                  d=json.load(open(f))
                  arr=d if isinstance(d,list) else d.get('listings', d.get('results', []))
              except Exception:
                  continue
              for r in arr:
                  if not isinstance(r,dict):
                      continue
                  platform=((r.get('platform') or {}).get('name')) or 'unknown'
                  ext=r.get('external_id') or r.get('id')
                  key=(platform, str(ext))
                  if key in seen:
                      continue
                  seen.add(key)
                  rows.append(r)
          if not rows:
              raise SystemExit('ERROR: no listings scraped from any national source')
          out=Path('apps/web/src/data/scraped-listings.json')
          out.write_text(json.dumps(rows, ensure_ascii=False))
          print(f'Wrote {len(rows)} merged national listings from {len(files)} source files')
          PY


      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings.json
          git diff --staged --quiet || git commit -m "chore: refresh national listings (la+dc+es+ms+pb+az) [skip ci]"
          git push origin ${{ github.ref_name }}
