name: Refresh Listings (Full National)

# Fallback full-national run once daily.
# Split per-platform runs in scrape-fast.yml / scrape-medium.yml / scrape-slow.yml
# are preferred; this workflow runs as a safety net.
#
# Vercel deploys automatically when this workflow commits & pushes to the branch
# via Vercel's GitHub integration — NO VERCEL_TOKEN step needed.
on:
  schedule:
    - cron: "0 3 * * *"   # 3:00 AM UTC daily (off-peak)
  workflow_dispatch:        # manual trigger from the GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli

      - name: Run national hydration (BidSpotter + HiBid + EstateSales + MaxSold + Proxibid)
        run: python backend/scrapers/hydrate.py --national --max-pages 17

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings.json \
                  apps/web/src/data/scraped-listings-fast.json \
                  apps/web/src/data/scraped-listings-estate.json \
                  apps/web/src/data/scraped-listings-ebay.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: full national listings refresh [skip ci]"
          git push
