name: Refresh Listings

# Runs daily at 6 AM UTC to scrape fresh listings from 4 platforms
# (MaxSold, BidSpotter, HiBid, EstateSales.NET), commit the updated
# scraped-listings.json, and deploy to Vercel production.
on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 AM UTC every day
  workflow_dispatch:        # allow manual trigger from the GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit scraped-listings.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper dependencies
        run: pip install httpx beautifulsoup4 lxml python-dateutil brotli

      - name: Run hydrate (MaxSold + BidSpotter + HiBid + EstateSales.NET)
        run: python backend/scrapers/hydrate.py --targets ms,bs,hi,es --max-pages 17

      - name: Commit updated listings if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/data/scraped-listings.json
          # Only commit if the file actually changed (skip if scrapers returned same data)
          git diff --staged --quiet || git commit -m "chore: refresh scraped listings [skip ci]"
          git push

      - name: Deploy to Vercel
        # Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets.
        # Set these in: GitHub repo → Settings → Secrets and variables → Actions
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: apps/web
