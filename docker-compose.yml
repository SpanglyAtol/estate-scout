version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: estate_scout_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estate_scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-estate_scout}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estate_scout}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: estate_scout_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: estate_scout_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-estate_scout}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-estate_scout}
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod-32chars!!}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@estatescout.app}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - full  # run with: docker compose --profile full up

  # Optional: run scrapers once on container start (useful for seeding dev data)
  scraper:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: estate_scout_scraper
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-estate_scout}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-estate_scout}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.scheduler
    restart: "no"  # run once only
    profiles:
      - scrape  # run with: docker compose --profile scrape run --rm scraper

volumes:
  postgres_data:
  redis_data:
